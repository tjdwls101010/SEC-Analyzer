name: Live Health Check

on:
  # Weekly Monday 07:17 UTC. Non-round minute avoids top-of-hour congestion.
  schedule:
    - cron: "17 7 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  live-healthcheck:
    runs-on: ubuntu-latest
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'

      - name: Pre-flight live configuration
        run: |
          if [ -z "${OPENROUTER_API_KEY:-}" ]; then
            echo "::error::OPENROUTER_API_KEY is missing or empty"
            exit 1
          fi

      # SEC EDGAR 403s shared CI IPs, so the weekly check is OpenRouter-only
      # (a real Provider extraction on a fixture filing, no live SEC). The full
      # live SEC tests are marked `sec` and run on-demand from a residential IP.
      - name: Run live health-check (OpenRouter only)
        run: |
          set +e
          python -m pytest -m "live and not sec"
          status=$?
          if [ "$status" -eq 5 ]; then
            echo "::error::No live tests collected"
            exit 1
          fi
          exit "$status"
